name: fix go.sum
on:
  push:
    branches:
      - renovate/*

jobs:
  fix:
    runs-on: 'ubuntu-24.04'
    steps:
      - uses: actions/checkout@v5

      - uses: at-wat/go-sum-fix-action@v0
        with:
          git_user: 'github-actions[bot]'
          git_email: 'github-actions[bot]@users.noreply.github.com'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_style: squash
          push: force
