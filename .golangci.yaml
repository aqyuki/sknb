version: '2'
linters:
  default: none
  enable:
    - staticcheck
    - govet
    - wsl_v5
    - depguard
  settings:
    depguard:
      rules:
        errors:
          files:
            - $all
          deny:
            - pkg: errors
              desc: github.com/cockroachdb/errorsを利用してください
            - pkg: 'go.dev'
formatters:
  enable:
    - goimports
    - gofumpt
    - gci
